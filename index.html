<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="TupTup Demo — nawigacja do lokalu 229 przy ul. Erazma Ciołka 10 w Warszawie, piętro 2.">
    <title>Tup Runtime Demo</title>
    <script type="module" src="/index.js"></script>
  </head>
  <body>
    <noscript>
      <h1>TupTup Demo</h1>
      <p>ul. Erazma Ciołka 10 lok. 229, Warszawa</p>
      <p>Piętro 2, lokal 229</p>
      <ol>
        <li>Budynek — C10</li>
        <li>Ochrona — Poproś o aktywację windy</li>
        <li>Piętro — 2</li>
        <li>Skręć w lewo</li>
        <li>Cel — 229 →</li>
      </ol>
    </noscript>

    <main class="app">
      <div
        class="map"
        aria-hidden="true"
        style="background: linear-gradient(135deg, #dbeafe, #f3f4f6 55%, #dcfce7);"
      ></div>

      <article id="place" class="sheet screen active" aria-label="Podgląd miejsca">
        <div class="sheet-grabber" aria-hidden="true"></div>

        <div class="sheet-content">
          <tup-place-header
            sync-title
            name="TupTup Demo"
            address="ul. Erazma Ciołka 10 lok. 229"
            lat="52.2297"
            lng="21.0122"
          ></tup-place-header>

          <tup-place-photo
            src="https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=1200&q=80"
            alt="Przykladowe biuro"
            fallback-src="https://placehold.co/1200x675/e5e7eb/111827?text=TupTup"
          ></tup-place-photo>

          <tup-route>
            <tup-route-step
              type="building"
              label="Budynek"
              text="C10"
              emphasis="primary"
            ></tup-route-step>
            <tup-route-step
              type="hand"
              label="Ochrona"
              text="Poproś o aktywację windy"
              tone="warning"
            ></tup-route-step>
            <tup-route-step
              type="elevator"
              label="Piętro"
              text="2"
              emphasis="primary"
            ></tup-route-step>
            <tup-route-step
              type="left"
              text="Skręć w lewo"
            ></tup-route-step>
            <tup-route-step
              type="target"
              label="Cel"
              text="229"
              direction="right"
              emphasis="primary"
            ></tup-route-step>
          </tup-route>

          <tup-navigation-button>Prowadz</tup-navigation-button>
        </div>
      </article>
    </main>
  </body>
</html>
