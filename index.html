<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Sulmar — nawigacja do lokalu 229 przy ul. Erazma Ciołka 10 w Warszawie, piętro 2.">
    <title>Sulmar</title>
    <script type="module" src="/index.js"></script>
  </head>
  <body>
    <noscript>
      <h1>Sulmar</h1>
      <p>ul. Erazma Ciołka 10 lok. 229, Warszawa</p>
      <p>C10 · Piętro 2 · Lokal 229</p>
      <p>Piętro 2, lokal 229</p>
      <ol>
        <li>Wejdź do budynku C10</li>
        <li>Poproś ochronę o aktywację windy</li>
        <li>Wjedź na 2 piętro</li>
        <li>Wprowadź kod ****</li>
        <li>Skręć w lewo</li>
        <li>Idź prosto do końca korytarza</li>
        <li>Lokal 229 po prawej stronie</li>
      </ol>
    </noscript>

    <main class="app">
      <div
        class="map"
        aria-hidden="true"
        style="background: linear-gradient(135deg, #dbeafe, #f3f4f6 55%, #dcfce7);"
      ></div>

      <article
        id="place"
        class="sheet screen active"
        data-place-id="sulmar"
        aria-label="Podgląd miejsca"
      >
        <div class="sheet-content">
          <tup-place-header
            sync-title
            name="Sulmar"
            summary="C10 · Piętro 2 · Lokal 229"
            address="ul. Erazma Ciołka 10 lok. 229"
            lat="52.2297"
            lng="21.0122"
          ></tup-place-header>

          <tup-place-photo
            src="https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=1200&q=80"
            alt="Przykladowe biuro"
            fallback-src="https://placehold.co/1200x675/e5e7eb/111827?text=TupTup"
          ></tup-place-photo>

          <tup-route>
            <tup-route-step
              type="start"
              text="Wejdź do budynku **C10**"
            ></tup-route-step>
            <tup-route-step
              type="hand"
              text="Poproś ochronę o aktywację windy"
              tone="warning"
            ></tup-route-step>
            <tup-route-step
              type="floor-up"
              text="Wjedź na **2 piętro**"
            ></tup-route-step>
            <tup-route-step
              type="key"
              text="Wprowadź kod"
              code="1234"
              code-hide-after="15"
            ></tup-route-step>
            <tup-route-step
              type="left"
              text="Skręć w lewo"
            ></tup-route-step>
            <tup-route-step
              type="straight"
              text="Idź prosto do końca korytarza"
            ></tup-route-step>
            <tup-route-step
              type="target"
              text="**Lokal 229** po prawej stronie"
            ></tup-route-step>
          </tup-route>

          <tup-navigation-button>Prowadz</tup-navigation-button>
          <tup-footer></tup-footer>
        </div>
      </article>
    </main>
  </body>
</html>
