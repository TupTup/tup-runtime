<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="TupTup Demo — nawigacja do biura przy ul. Przykładowej 10 w Warszawie, budynek A, piętro 3, lokal 305.">
    <title>Tup Runtime Demo</title>
    <script type="module" src="/index.js"></script>
  </head>
  <body>
    <noscript>
      <h1>TupTup Demo</h1>
      <p>ul. Przykładowa 10, Warszawa</p>
      <p>Budynek A, piętro 3, lokal 305</p>
      <ol>
        <li>Wejdź przez recepcję (20 m)</li>
        <li>Wejdź na 3 piętro (35 m)</li>
        <li>Lokal 305 będzie po prawej stronie</li>
      </ol>
    </noscript>

    <main class="app">
      <div
        class="map"
        aria-hidden="true"
        style="background: linear-gradient(135deg, #dbeafe, #f3f4f6 55%, #dcfce7);"
      ></div>

      <article id="place" class="sheet screen active" aria-label="Podgląd miejsca">
        <div class="sheet-grabber" aria-hidden="true"></div>

        <div class="sheet-content">
          <tup-place-header
            sync-title
            name="TupTup Demo"
            address="ul. Przykladowa 10, Warszawa"
            lat="52.2297"
            lng="21.0122"
          ></tup-place-header>

          <tup-hero-gallery>
            <tup-place-photo
              src="https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=1200&q=80"
              alt="Przykladowe biuro"
              fallback-src="https://placehold.co/1200x675/e5e7eb/111827?text=TupTup"
            ></tup-place-photo>

            <tup-place-map
              lat="52.2416171"
              lng="20.9456936"
              alt="Mapa lokalizacji"
              building-footprint='{"type":"FeatureCollection","licence":"Data © OpenStreetMap contributors, ODbL 1.0. http://osm.org/copyright","features":[{"type":"Feature","properties":{"place_id":177021757,"osm_type":"way","osm_id":160207067,"place_rank":30,"category":"building","type":"office","importance":8.366292820625647e-05,"addresstype":"building","name":"C10","display_name":"C10, 10, Erazma Ciołka, Koło-Górczewska, Koło, Wola, Warszawa, województwo mazowieckie, 01-402, Polska","address":{"building":"C10","house_number":"10","road":"Erazma Ciołka","neighbourhood":"Koło-Górczewska","quarter":"Koło","suburb":"Wola","city":"Warszawa","state":"województwo mazowieckie","ISO3166-2-lvl4":"PL-14","postcode":"01-402","country":"Polska","country_code":"pl"}},"bbox":[20.9454848,52.2413835,20.9459023,52.2418507],"geometry":{"type":"Polygon","coordinates":[[[20.9454848,52.2418142],[20.9456054,52.2415792],[20.9456665,52.2414636],[20.9456795,52.2414368],[20.9457058,52.2413837],[20.9457744,52.2413969],[20.9457779,52.2413902],[20.9457813,52.2413835],[20.9459023,52.2414068],[20.9458358,52.2415365],[20.9456745,52.2418507],[20.9455742,52.2418314],[20.9454848,52.2418142]]]}}]}'
            ></tup-place-map>
          </tup-hero-gallery>

          <tup-place-summary
            building="A"
            floor="3"
            room="305"
            navigate
          ></tup-place-summary>

          <tup-route>
            <tup-route-step
              type="reception"
              text="Wejdz przez **recepcje**"
              distance="20 m"
            ></tup-route-step>
            <tup-route-step
              type="stairs"
              text="Wejdz na **3 pietro**"
              distance="35 m"
            ></tup-route-step>
            <tup-route-step
              type="door"
              text="Lokal **305** bedzie po prawej stronie"
            ></tup-route-step>
          </tup-route>

          <tup-navigation-button>Prowadz</tup-navigation-button>
        </div>
      </article>
    </main>
  </body>
</html>
